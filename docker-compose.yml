# Orbitchat 本地开发基础设施
#
# 默认容器名与常见本机实例对齐：im-postgres / im-redis
# 若本机已有同名容器在跑（例如其他项目的 im-postgres），请勿重复 up postgres/redis，
# 直接复用现有实例并在其中创建 orbitchat 库即可 — 见 docs/env.md
#
# 用法：pnpm docker:up
# Phase 1 必需：postgres
# Phase 3+ 可选：redis（Session 缓存 / WS Pub-Sub，见 ADR 08、realtime-spec）

services:
  postgres:
    # pgvector extension required for Wave 3 RAG (knowledge_chunks.embedding)
    image: pgvector/pgvector:pg16
    container_name: im-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orbitchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orbitchat}
      POSTGRES_DB: ${POSTGRES_DB:-orbitchat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-orbitchat} -d ${POSTGRES_DB:-orbitchat}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: im-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:latest
    container_name: im-minio
    restart: unless-stopped
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  minio_data:
